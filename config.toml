baseurl      = "/"
languageCode = "en-au"
theme        = "terminal"
paginate     = 5

[params]
  contentTypeName = "posts"
  themeColor = "green"
  showMenuItems = 2
  fullWidthTheme = false
  centerTheme = true
  showLastUpdated = false
  autoCover = true

[languages]
  [languages.en]
    languageName = "English"
    title = "Anvbis"
    subtitle = "Exploit development and reverse engineering."
    keywords = ""
    copyright = 'Copyright 2020 Anvbis'
    menuMore = "Show more"
    readMore = "Read more"
    readOtherPosts = "Read other posts"
    newerPosts = "Newer posts"
    olderPosts = "Older posts"
    missingContentMessage = "Page not found..."
    issingBackButtonLabel = "Return to home page"

    [languages.en.params.logo]
      logoText = "anvbis"
      logoHomeLink = "/"

    [languages.en.menu]
      [[languages.en.menu.main]]
        identifier = "about"
        name       = "About"
        url        = "/about"

